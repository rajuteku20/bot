<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PRO Signal Bot</title>

<style>
body { background:#0d0d0d; color:#eee; font-family:sans-serif; padding:15px; }
h1 { text-align:center; color:#f0c040; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:12px; }
.card { background:#161616; padding:14px; border-radius:10px; }
.signal { font-size:26px; font-weight:bold; text-align:center; }
.UP { color:#00e676; }
.DOWN { color:#ff5252; }
.WAIT { color:#ffab40; }
.ind { font-size:12px; margin-top:6px; color:#aaa; }
.reason { font-size:11px; color:#888; margin-top:5px; }
.topbar { display:flex; justify-content:space-between; margin-bottom:10px; }
button { padding:6px 12px; background:#1e1e1e; color:#ccc; border:1px solid #333; border-radius:6px; cursor:pointer; }
</style>

</head>

<body>

<h1>⚡ PRO SIGNAL BOT</h1>

<div class="topbar">
  <button onclick="load()">Refresh</button>
  <span id="time"></span>
</div>

<div id="grid">Loading...</div>

<script>
const API_KEY = "MB1YRLRNKNIMS677";

const PAIRS = ["EURUSD","GBPUSD","USDCAD","EURGBP"];

// ---------- FETCH ----------
async function getData(symbol){
  const url = `https://www.alphavantage.co/query?function=FX_INTRADAY&from_symbol=${symbol.slice(0,3)}&to_symbol=${symbol.slice(3)}&interval=1min&outputsize=compact&apikey=${API_KEY}`;
  const res = await fetch(url);
  const data = await res.json();

  const key = Object.keys(data).find(k=>k.includes("Time Series"));
  const series = data[key];
  if(!series) throw "limit";

  const closes=[], highs=[], lows=[], opens=[];

  Object.values(series).reverse().forEach(c=>{
    opens.push(+c["1. open"]);
    highs.push(+c["2. high"]);
    lows.push(+c["3. low"]);
    closes.push(+c["4. close"]);
  });

  return {closes,highs,lows,opens};
}

// ---------- INDICATORS ----------
const EMA = (d,p)=>{let k=2/(p+1),e=d[0]; return d.map(v=>e=v*k+e*(1-k));};

function RSI(d,p=14){
  let g=0,l=0;
  for(let i=1;i<=p;i++){let x=d[i]-d[i-1]; x>0?g+=x:l-=x;}
  let rs=g/l; return 100-(100/(1+rs));
}

function MACD(d){
  let e12=EMA(d,12), e26=EMA(d,26);
  let m=e12.map((v,i)=>v-e26[i]);
  let s=EMA(m,9);
  return m.at(-1)-s.at(-1);
}

function BB(d){
  let s=d.slice(-20);
  let avg=s.reduce((a,b)=>a+b)/20;
  let std=Math.sqrt(s.reduce((a,b)=>a+(b-avg)**2,0)/20);
  let last=d.at(-1);
  return ((last-(avg-2*std))/((avg+2*std)-(avg-2*std)))*100;
}

function STOCH(h,l,c){
  let hi=Math.max(...h.slice(-14));
  let lo=Math.min(...l.slice(-14));
  return ((c.at(-1)-lo)/(hi-lo))*100;
}

function pattern(o,h,l,c){
  let body=Math.abs(c-o), range=h-l;
  if(body<range*0.1) return "Doji";
  if(c>o && body>range*0.7) return "Bullish Marubozu";
  if(c<o && body>range*0.7) return "Bearish Marubozu";
  return "";
}

// ---------- SIGNAL ----------
function analyze(d){
  let rsi=RSI(d.closes);
  let macd=MACD(d.closes);
  let bb=BB(d.closes);
  let stoch=STOCH(d.highs,d.lows,d.closes);
  let ema9=EMA(d.closes,9).at(-1);
  let ema21=EMA(d.closes,21).at(-1);

  let score=0, reasons=[];

  if(rsi<35){score+=2; reasons.push("RSI oversold");}
  else if(rsi>65){score-=2; reasons.push("RSI overbought");}

  if(macd>0){score+=2; reasons.push("MACD bullish");}
  else{score-=2; reasons.push("MACD bearish");}

  if(bb<20){score+=1; reasons.push("BB lower");}
  else if(bb>80){score-=1; reasons.push("BB upper");}

  if(ema9>ema21){score+=1; reasons.push("EMA uptrend");}
  else{score-=1; reasons.push("EMA downtrend");}

  if(stoch<25){score+=1; reasons.push("Stoch oversold");}
  else if(stoch>75){score-=1; reasons.push("Stoch overbought");}

  let p=pattern(d.opens.at(-1),d.highs.at(-1),d.lows.at(-1),d.closes.at(-1));
  if(p){reasons.push(p);}

  let conf=Math.min(95,Math.abs(score)*10+50);

  let sig="WAIT";
  if(score>=2) sig="UP";
  if(score<=-2) sig="DOWN";

  return {sig,conf,reasons,rsi,macd,bb,stoch,ema9,ema21};
}

// ---------- LOAD ----------
async function load(){
  document.getElementById("time").textContent="Updating...";
  let grid=document.getElementById("grid");
  grid.innerHTML="Loading...";

  let html="";

  for(let p of PAIRS){
    try{
      let d=await getData(p);
      let a=analyze(d);
      let price=d.closes.at(-1);

      html+=`
      <div class="card">
        <b>${p}</b><br>
        ${price.toFixed(5)}
        <div class="signal ${a.sig}">${a.sig}</div>
        Confidence: ${a.conf}%<br>
        <div class="ind">
          RSI: ${a.rsi.toFixed(1)} |
          MACD: ${a.macd.toFixed(4)} |
          BB: ${a.bb.toFixed(1)}%<br>
          EMA: ${a.ema9>a.ema21?"UP":"DOWN"} |
          Stoch: ${a.stoch.toFixed(1)}
        </div>
        <div class="reason">${a.reasons.join(" • ")}</div>
      </div>`;
    }catch{
      html+=`<div class="card">${p}<br>API limit</div>`;
    }
  }

  grid.innerHTML=html;
  document.getElementById("time").textContent=new Date().toLocaleTimeString();
}

// auto refresh (safe)
setInterval(load, 60000);

load();
</script>

</body>
</html>
